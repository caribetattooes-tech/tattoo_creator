workflows:
  ios-workflow:
    name: Build iOS App
    max_build_duration: 90
    environment:
      flutter: stable
      xcode: latest
    artifacts:
      - "build/ios/iphonesimulator/Runner.app"
    scripts:
      - name: Build iOS for simulator
        script: |
          flutter pub get
          flutter build ios --debug --simulator
      - name: Verify build output
        script: |
          ls -la build/ios/
          ls -la build/ios/iphonesimulator/