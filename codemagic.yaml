workflows:
  ios-workflow:
    name: Build iOS App
    max_build_duration: 90
    environment:
      flutter: stable
      xcode: latest
    scripts:
      - name: Initialize iOS project
        script: |
          flutter create --org com.tattoocreator --project-name tattoo_creator --platforms ios .
      - name: Get Flutter dependencies
        script: |
          flutter pub get
      - name: Install CocoaPods
        script: |
          cd ios && pod install && cd ..
      - name: Build iOS app for simulator
        script: |
          flutter build ios --simulator --no-codesign --verbose
    artifacts:
      - build/ios/iphonesimulator/*.app