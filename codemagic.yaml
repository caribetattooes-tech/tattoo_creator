workflows:
  ios-workflow:
    name: Build iOS App
    max_build_duration: 90
    environment:
      flutter: stable
      xcode: latest
    scripts:
      - name: Install dependencies
        script: |
          flutter pub get
      - name: Install CocoaPods
        script: |
          cd ios && pod install && cd ..
      - name: Build iOS for simulator
        script: |
          cd ios
          xcodebuild -workspace Runner.xcworkspace -scheme Runner -sdk iphonesimulator -destination 'platform=iOS Simulator,name=iPhone 15' CODE_SIGNING_ALLOWED=NO CODE_SIGN_IDENTITY='' DEVELOPMENT_TEAM='' build
      - name: Verify build
        script: |
          ls -la ios/build/Debug-iphonesimulator/ || true
          ls -la ios/build/Release-iphonesimulator/ || true
    artifacts:
      - "ios/build/Debug-iphonesimulator/Runner.app"
      - "ios/build/Release-iphonesimulator/Runner.app"