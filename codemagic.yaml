workflows:
  ios-workflow:
    name: Build iOS App
    max_build_duration: 90
    environment:
      flutter: stable
      xcode: latest
    scripts:
      - name: Install dependencies
        script: |
          flutter pub get
      - name: Build iOS using xcodebuild directly
        script: |
          flutter build ios --debug --no-codesign
        ignore_exit_code: true
      - name: Build with xcodebuild directly
        script: |
          cd ios
          xcodebuild -workspace Runner.xcworkspace -scheme Runner -sdk iphonesimulator -destination 'platform=iOS Simulator,name=iPhone 15' build
    artifacts:
      - "build/ios/iphonesimulator/Runner.app"
      - "ios/build/Release-iphonesimulator/Runner.app"