name: tattoo_creator
description: App de edición de video para tatuadores - crea contenido viral para Instagram
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.4.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.6
  flutter_riverpod: ^2.4.9
  ffmpeg_kit_flutter_full_gpl: ^6.0.3
  image_picker: ^1.0.7
  path_provider: ^2.1.2
  go_router: ^13.1.0
  uuid: ^4.3.3
  video_player: ^2.8.3
  permission_handler: ^11.2.0
  share_plus: ^7.2.1
  cached_network_image: ^3.3.1
  google_fonts: ^6.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/music/
    - assets/images/